server:
  port: 8080

spring:
  application:
    name: scaffold

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/scaffold?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: ScaffoldHikariCP

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: dev-secret-key-for-development-only-change-in-prod
  expiration: 86400000

cors:
  allowed-origins: "*"
  allow-credentials: false

knife4j:
  enable: true
  setting:
    language: zh_CN
  swagger-config:
    enable: true

springdoc:
  swagger-ui:
    enabled: true
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.company.scaffold

logging:
  level:
    root: INFO
    com.company.scaffold: DEBUG

server:
  port: 8080

spring:
  application:
    name: scaffold

  profiles:
    active: dev

  main:
    allow-circular-references: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8
    clean-disabled: false
    clean-on-validation-error: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.company.scaffold.module.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  header: Authorization
  prefix: Bearer

generator:
  author: scaffold
  base-package: com.company.scaffold
  module-name: system
  table-prefix: sys_
  java-output-path: /src/main/java
  resources-output-path: /src/main/resources
  frontend-output-path: D:/workspace/frontend/src
  generate-controller: true
  generate-service: true
  generate-mapper: true
  generate-entity: true
  generate-vue: true
  generate-react: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/scaffold.log
